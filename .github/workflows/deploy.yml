name: Build & Deploy

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ─── JOB 1: Build image dan push ke GHCR ─────────────────
  build-and-push:
    name: Build & Push ke GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login ke GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          # GITHUB_TOKEN otomatis tersedia, tidak perlu buat manual
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache build layers — pnpm install tidak diulang
          # kalau package.json & lockfile tidak berubah
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── JOB 2: Deploy ke VPS ─────────────────────────────────
  deploy:
    name: Deploy ke VPS
    runs-on: ubuntu-latest
    # Job ini hanya jalan kalau job build-and-push berhasil
    needs: build-and-push

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_PORT }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # Login ke GHCR pakai CR_PAT
            # CR_PAT dipakai karena VPS adalah "mesin luar" yang butuh
            # token permanen — GITHUB_TOKEN hanya hidup saat Actions berjalan
            echo ${{ secrets.CR_PAT }} | docker login ghcr.io \
              -u ${{ github.actor }} --password-stdin

            # Pull image terbaru
            docker pull ghcr.io/${{ github.repository }}:latest

            # Stop dan hapus container lama
            docker stop mas-aris-project 2>/dev/null || true
            docker rm mas-aris-project 2>/dev/null || true

            # Jalankan container baru di network proxy
            docker run -d \
              --name mas-aris-project \
              --restart unless-stopped \
              --network proxy \
              ghcr.io/${{ github.repository }}:latest

            # Bersihkan image lama yang tidak terpakai
            docker image prune -f

            echo "✅ Deploy berhasil!"
